name: SOS Price Hunter - reporte mensual

on:
  schedule:
    - cron: "0 13 25 * *"
  workflow_dispatch:
    inputs:
      stores:
        description: "Tiendas (separadas por coma)"
        required: false
        default: "d1,ara,alkosto,makro,olimpica"
      skip_email:
        description: "Solo HTML sin enviar email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  price-hunt:
    name: Scraping y reporte de precios
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline de precios
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          STORES="${{ github.event.inputs.stores || 'd1,ara,alkosto,makro,olimpica' }}"
          SKIP_EMAIL="${{ github.event.inputs.skip_email || 'false' }}"
          CMD="python main.py --stores $STORES"
          if [ "$SKIP_EMAIL" = "true" ]; then
            CMD="$CMD --skip-email"
          fi
          echo "Corriendo: $CMD"
          $CMD

      - name: Guardar reporte como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: price-report-${{ github.run_number }}
          path: |
            reports/
            data/comparison_*.json
          retention-days: 90

      - name: Resumen en Actions
        if: always()
        run: python scripts/summary.py >> $GITHUB_STEP_SUMMARY
